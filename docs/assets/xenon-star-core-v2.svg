<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Xenon Star Core icon concept</title>
  <desc id="desc">A luminous xenon-blue eight-point star core surrounded by a small constellation.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="46%" r="53%">
      <stop offset="0" stop-color="#18284b"/>
      <stop offset="0.62" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#070b16"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8be9ff" stop-opacity="0.72"/>
      <stop offset="0.34" stop-color="#628bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7557ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="core" x1="0.15" y1="0.08" x2="0.84" y2="0.91">
      <stop offset="0" stop-color="#edfdff"/>
      <stop offset="0.28" stop-color="#8be9ff"/>
      <stop offset="0.68" stop-color="#7695ff"/>
      <stop offset="1" stop-color="#a788ff"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8be9ff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#8be9ff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#a788ff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pin-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="star-five" d="M0-12 2.8-3.9 11.4-3.7 4.6 1.5 7.1 9.7 0 5-7.1 9.7-4.6 1.5-11.4-3.7-2.8-3.9Z"/>
  </defs>

  <!-- A circle, not a rounded square: the silhouette remains stellar at tab-icon sizes. -->
  <circle cx="256" cy="256" r="242" fill="url(#space)"/>
  <circle cx="256" cy="256" r="241" fill="none" stroke="#759cff" stroke-opacity="0.16" stroke-width="2"/>

  <!-- Broken orbital paths suggest a constellation/model network without boxing in the mark. -->
  <g fill="none" stroke="url(#orbit)" stroke-linecap="round">
    <ellipse cx="256" cy="256" rx="202" ry="82" stroke-width="2.2" stroke-dasharray="118 22 44 28" transform="rotate(-13 256 256)"/>
    <ellipse cx="256" cy="256" rx="96" ry="204" stroke-width="1.4" stroke-dasharray="48 34 104 26" transform="rotate(38 256 256)" opacity="0.56"/>
  </g>

  <!-- Constellation pins. Different scales keep the composition organic rather than geometric. -->
  <g fill="#baf4ff" filter="url(#pin-glow)">
    <use href="#star-five" transform="translate(100 154) scale(.78)" opacity="0.92">
      <animate attributeName="opacity" values=".32;1;.45;.32" dur="2.4s" repeatCount="indefinite"/>
    </use>
    <use href="#star-five" transform="translate(406 168) scale(.48)" opacity="0.70">
      <animate attributeName="opacity" values=".24;.55;1;.24" dur="2s" begin="-.8s" repeatCount="indefinite"/>
    </use>
    <use href="#star-five" transform="translate(414 342) scale(.86)" opacity="0.90">
      <animate attributeName="opacity" values="1;.38;.72;1" dur="2.8s" begin="-.4s" repeatCount="indefinite"/>
    </use>
    <use href="#star-five" transform="translate(114 376) scale(.42)" opacity="0.62">
      <animate attributeName="opacity" values=".25;1;.44;.25" dur="1.9s" begin="-.3s" repeatCount="indefinite"/>
    </use>
  </g>
  <g fill="#8baeff">
    <circle cx="81" cy="283" r="3" opacity=".82"/>
    <circle cx="151" cy="104" r="2.5" opacity=".66"/>
    <circle cx="354" cy="83" r="3.5" opacity=".72"/>
    <circle cx="445" cy="254" r="2.5" opacity=".58"/>
    <circle cx="331" cy="429" r="3" opacity=".78"/>
  </g>

  <!-- The core is an eight-ray xenon discharge: unmistakably a star even at 16 px. -->
  <circle cx="256" cy="256" r="156" fill="url(#halo)" opacity=".74">
    <animate attributeName="r" values="146;164;146" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".54;.82;.54" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <path d="M256 54 274 212 350 162 300 236 458 256 300 276 350 350 276 300 256 458 236 300 162 350 212 276 54 256 212 236 162 162 236 212Z"
        fill="url(#core)" filter="url(#soft-glow)" opacity=".97">
    <animate attributeName="opacity" values=".82;1;.88;.82" dur="1.45s" repeatCount="indefinite"/>
  </path>
  <circle cx="256" cy="256" r="52" fill="#eefeff" opacity=".16"/>
  <circle cx="256" cy="256" r="39" fill="#101b38" fill-opacity=".76" stroke="#c8f8ff" stroke-opacity=".62" stroke-width="1.5"/>
  <text x="256" y="258" text-anchor="middle" dominant-baseline="middle"
        fill="#f5feff" font-family="'SF Mono','Cascadia Code','JetBrains Mono',monospace"
        font-size="31" font-weight="750" letter-spacing="-2">Xe</text>
</svg>
