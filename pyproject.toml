[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omniagent-cli"
version = "0.1.0"
description = "Local multi-model AI Coding Agent CLI with ReAct, Plan-Execute, MCP tools, memory & TUI"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Xianyu Sheng"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Code Generators",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27.0",
    "prompt_toolkit>=3.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "textual>=0.50.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.urls]
Homepage = "https://github.com/xianyu-sheng/omniagent"
Repository = "https://github.com/xianyu-sheng/omniagent"
Issues = "https://github.com/xianyu-sheng/omniagent/issues"

[project.scripts]
omniagent = "omniagent.main:cli"
omniagent-core = "omniagent.core.app:run"
omniagent-tui = "omniagent.tui.app:start_tui"

# ════════════════════════════════════════════════════════════
# Engineering Quality Configuration
# ════════════════════════════════════════════════════════════

# ── Ruff: fast linter + import sorting + formatting ──
[tool.ruff]
src = ["."]
line-length = 100
target-version = "py312"
exclude = [".git", ".mypy_cache", ".pytest_cache", ".ruff_cache", "__pycache__", "build", "dist"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
    "B",   # flake8-bugbear (common bugs)
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # Ruff-specific rules
    "T20", # flake8-print
    "RET", # flake8-return
    "EM",  # flake8-errmsg
    "INP", # flake8-no-pep420
    "PERF",# Perflint
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "B904",   # raise from err
    "RUF001", # ambiguous unicode characters (false positives in Chinese text)
    "RUF002", # ambiguous unicode characters in docstrings
    "RUF003", # ambiguous unicode characters in comments
]
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S311", "T20"]
"omniagent/__init__.py" = ["F401"]
"__init__.py" = ["F401"]
"omniagent/tools/**/*.py" = ["RUF012"]
"omniagent/engine/checkpoint.py" = ["UP017"]

[tool.ruff.lint.isort]
force-single-line = false
combine-as-imports = true
split-on-trailing-comma = false
order-by-type = true
relative-imports-order = "closest-to-furthest"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# ── Mypy: static type checking ──
[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_no_return = true
disallow_any_generics = false
disallow_subclassing_any = false
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
exclude = ["tests/", "build/", ".venv/", ".claude/"]

[[tool.mypy.overrides]]
module = [
    "omniagent.engine.checkpoint",
    "omniagent.engine.circuit_breaker",
    "omniagent.tools.test_runner",
]
strict = true

[[tool.mypy.overrides]]
module = [
    "omniagent.nodes.tool_node",
    "omniagent.repl.repl",
    "omniagent.engine.plan_execute_engine",
    "omniagent.engine.reflection_engine",
    "omniagent.engine.combined_engines",
    "omniagent.engine.novel_engine",
    "omniagent.tui.app",
    "omniagent.engine.subagent",
]
ignore_errors = true

[tool.setuptools.packages.find]
include = ["omniagent*"]

[tool.pytest.ini_options]
addopts = "-p no:capture"
asyncio_mode = "auto"
