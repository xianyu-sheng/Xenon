[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omniagent-cli"
version = "0.1.0"
description = "A decoupled, config-driven multi-model AI programming Agent scheduling engine"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "prompt_toolkit>=3.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
omniagent = "omniagent.main:cli"
omniagent-core = "omniagent.core.app:run"

# ════════════════════════════════════════════════════════════
# KamaClaude 借鉴: 工程质量管理
# ════════════════════════════════════════════════════════════

# ── Ruff: 快速 linter + import 排序 ──
[tool.ruff]
src = ["."]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]  # pycodestyle 错误、Pyflakes、isort、pyupgrade
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E501"]  # 测试文件允许长行

# ── Mypy: 静态类型检查 ──
[tool.mypy]
python_version = "3.10"
strict = false  # 渐进式: 先关闭 strict, 逐步打开
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true  # 第三方库可能无 stubs
exclude = ["tests/", "build/"]

[tool.setuptools.packages.find]
include = ["omniagent*"]
