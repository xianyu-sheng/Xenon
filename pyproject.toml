[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xenon"
version = "0.6.1"
description = "Xenon: AI coding assistant — where your wildest ideas come to life"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "prompt-toolkit>=3.0",
    "jedi>=0.19.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
xenon = "xenon.main:cli"

[tool.setuptools.packages.find]
include = ["xenon*"]
