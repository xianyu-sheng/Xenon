# Xenon 全局凭证配置模板
# 将此文件复制到 ~/.xenon/credentials.yaml 并填入真实的 API Key
#
# Windows:  %USERPROFILE%\.xenon\credentials.yaml
# Linux:    ~/.xenon/credentials.yaml
# macOS:    ~/.xenon/credentials.yaml
#
# 也可以通过环境变量配置（优先级更高）：
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, DEEPSEEK_API_KEY

openai: "sk-your-openai-api-key-here"
anthropic: "sk-ant-your-anthropic-api-key-here"
deepseek: "sk-your-deepseek-api-key-here"
